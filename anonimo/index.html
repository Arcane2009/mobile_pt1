<!--Aula de arrow function e setInterval-->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div id="caixa">
        <img class="cordeiro" src="images-removebg-preview.png" alt="Descrição da imagem">
    </div>

<script>
    let caixa = document.getElementById("caixa");
    let x = 0;
    let y = 0;
    let direcao = ""
    document.addEventListener("keydown", (e)=>{
        direcao = e.key;
    });
    setInterval(()=>{
        switch(direcao){
    case"ArrowRight": x+= 5; break;
    case"ArrowDown": y+= 5; break;
    case"ArrowLeft": x-= 5; break;
    case"ArrowUp": y-= 5; break;
        }
        caixa.style.left = x+"px";
        caixa.style.top = y+"px";
    },25);
</script>
</body>
</html>
